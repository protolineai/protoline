name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          package-manager-cache: false
      - run: npm ci
      - run: npm test
      - run: npm audit --omit=dev
      - run: npm pack --dry-run
